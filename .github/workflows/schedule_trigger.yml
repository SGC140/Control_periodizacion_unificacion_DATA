name: Schedule Trigger Sheets to BQ

on:
    schedule:
        - cron: '0 4 * * *'

    workflow_dispatch:

jobs:
    run-controldata-pipeline:
        runs-on: ubuntu-latest

        steps:
            - name: Replica Repo
              uses: actions/checkout@v4

            - name: Configuracion version Python 3.14
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'

            - name: Activacion requirements
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Reconstruccion de credenciales
              env:
                 CREDENCIALES_JSON: ${{secrets.CREDENCIALES_GCP}}
                 CLIENT_SECRETS_JSON: ${{secrets.CLIENT_SECRETS_JSON}}
                 CREDENTIAL_MODULE_JSON: ${{secrets.CREDENTIAL_MODULE_JSON}}
                 VARIABLES_ENTORNO: ${{secrets.ARCHIVO_ENV}}
              run: |
                echo "$CREDENCIALES_JSON" > credenciales.json
                echo "$VARIABLES_ENTORNO" > .env
                echo "$CLIENT_SECRETS_JSON" > client_secrets.json
                echo "$CREDENTIAL_MODULE_JSON" > credentials_module.json
            
            - name: Ejecutar trigger
              run: python trigger.py
